name: Repair VPS SSH

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/repair-vps-ssh.yml
      - scripts/live-runner-ssh-fix.sh

permissions:
  contents: read

concurrency:
  group: repair-vps-ssh
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ${{ fromJSON(vars.DEPLOY_RUNNER_LABELS || '["self-hosted","linux","website-deploy","private-network"]') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Repair SSH service
        run: sudo bash scripts/live-runner-ssh-fix.sh
