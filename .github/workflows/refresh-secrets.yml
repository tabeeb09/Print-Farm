name: Refresh Runtime Secrets

on:
  workflow_dispatch:
    inputs:
      secret_path:
        description: OpenBao path that changed
        required: false
  repository_dispatch:
    types:
      - secrets_changed

jobs:
  refresh:
    if: github.event_name == 'workflow_dispatch' || github.event.client_payload.source == 'openbao'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      DEPLOY_PATH: /srv/website/app
      PROJECT_NAME: website
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      SSH_OPTS: -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2
      BOOTSTRAP_ON_FAILURE: exit
      USE_LOCAL_RUSTFS_NETWORK: ${{ vars.USE_LOCAL_RUSTFS_NETWORK || 'true' }}
      APP_EXTRA_COMPOSE_FILES: ${{ vars.APP_EXTRA_COMPOSE_FILES || '' }}
      RUSTFS_EXTRA_COMPOSE_FILES: ${{ vars.RUSTFS_EXTRA_COMPOSE_FILES || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Request GitHub OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('https://github.com/${{ github.repository_owner }}');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Refresh deployment on VPS
        env:
          BAO_JWT_TOKEN: ${{ steps.oidc.outputs.token }}
          CHANGED_SECRET_PATH: ${{ github.event.client_payload.path || inputs.secret_path }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY_B64 }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          DEPLOY_SSH_KNOWN_HOSTS_B64: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS_B64 }}
        run: |
          test -n "$DEPLOY_HOST" || { echo "Missing secret DEPLOY_HOST"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "Missing secret DEPLOY_USER"; exit 1; }
          test -n "$SSH_PRIVATE_KEY" || test -n "$SSH_PRIVATE_KEY_B64" || { echo "Missing secret DEPLOY_SSH_PRIVATE_KEY or DEPLOY_SSH_PRIVATE_KEY_B64"; exit 1; }
          test -n "$DEPLOY_SSH_KNOWN_HOSTS" || test -n "$DEPLOY_SSH_KNOWN_HOSTS_B64" || { echo "Missing secret DEPLOY_SSH_KNOWN_HOSTS or DEPLOY_SSH_KNOWN_HOSTS_B64"; exit 1; }

          install -m 700 -d ~/.ssh
          if test -n "$SSH_PRIVATE_KEY_B64"; then
            printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          else
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          if test -n "$DEPLOY_SSH_KNOWN_HOSTS_B64"; then
            printf '%s' "$DEPLOY_SSH_KNOWN_HOSTS_B64" | base64 -d > ~/.ssh/known_hosts
          else
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

          ssh ${SSH_OPTS} -p "${DEPLOY_PORT}" ${DEPLOY_USER}@${DEPLOY_HOST} "cd '${DEPLOY_PATH}' && sudo git config --global --add safe.directory '${DEPLOY_PATH}' && sudo git fetch --all --prune && sudo git checkout main && sudo git pull --ff-only origin main"
          ssh ${SSH_OPTS} -p "${DEPLOY_PORT}" ${DEPLOY_USER}@${DEPLOY_HOST} "cd '${DEPLOY_PATH}' && sudo BOOTSTRAP_ON_FAILURE='${BOOTSTRAP_ON_FAILURE}' BAO_JWT_TOKEN='${BAO_JWT_TOKEN}' CHANGED_SECRET_PATH='${CHANGED_SECRET_PATH}' PROJECT_ROOT='${DEPLOY_PATH}' PROJECT_NAME='${PROJECT_NAME}' bash scripts/website-stack-vps.sh bootstrap"
          ssh ${SSH_OPTS} -p "${DEPLOY_PORT}" ${DEPLOY_USER}@${DEPLOY_HOST} "cd '${DEPLOY_PATH}' && sudo PROJECT_ROOT='${DEPLOY_PATH}' PROJECT_NAME='${PROJECT_NAME}' USE_LOCAL_RUSTFS_NETWORK='${USE_LOCAL_RUSTFS_NETWORK}' APP_EXTRA_COMPOSE_FILES='${APP_EXTRA_COMPOSE_FILES}' RUSTFS_EXTRA_COMPOSE_FILES='${RUSTFS_EXTRA_COMPOSE_FILES}' bash scripts/website-stack-vps.sh deploy"
