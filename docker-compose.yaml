services:
  rustfs:
    image: rustfs/rustfs:latest
    command: server
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    networks:
      - bootstrap

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-dev-keycloak-db-password}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - bootstrap

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --http-port=8080 --hostname-strict=false
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-dev-keycloak-db-password}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - bootstrap

  openbao:
    image: openbao/openbao:2.3.1
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_DEV_ROOT_TOKEN:-dev-only-root-token}
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    networks:
      - bootstrap

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    extra_hosts:
      - "${KEYCLOAK_LOCAL_HOSTNAME:-DESKTOP-IRL5SNU}:host-gateway"
    command:
      - --http-address=0.0.0.0:4180
      - --provider=keycloak-oidc
      - --oidc-issuer-url=http://${KEYCLOAK_LOCAL_HOSTNAME:-DESKTOP-IRL5SNU}:8080/realms/website
      - --client-id=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET:-}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:-}
      - --cookie-secure=false
      - --cookie-httponly=true
      - --email-domain=*
      - --redirect-url=${OAUTH2_PROXY_REDIRECT_URL:-http://localhost:4180/oauth2/callback}
      - --upstream=http://rustfs:9001
      - --scope=openid profile email roles
      - --skip-provider-button=true
      - --set-xauthrequest=true
      - --pass-access-token=true
    ports:
      - "4180:4180"
    depends_on:
      - keycloak
      - rustfs
    networks:
      - bootstrap

networks:
  bootstrap:

volumes:
  rustfs_data:
  keycloak_db_data:
