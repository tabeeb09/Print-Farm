services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ${WEBSITE_IMAGE:-website:local}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-${AUTH_SECRET}}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_REQUIRED_MEDIA_ROLES: ${KEYCLOAK_REQUIRED_MEDIA_ROLES:-owner,media_admin}
      KEYCLOAK_ROLE_CLAIM_PATH: ${KEYCLOAK_ROLE_CLAIM_PATH:-resource_access.website.roles}
      KEYCLOAK_ADMIN_REALM: ${KEYCLOAK_ADMIN_REALM:-master}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-website-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      BAO_ADDR: ${BAO_ADDR}
      BAO_KV_MOUNT: ${BAO_KV_MOUNT:-kv}
      BAO_SECRET_PATH_WEBSITE: ${BAO_SECRET_PATH_WEBSITE:-website/prod}
      BAO_SECRET_PATH_RUSTFS: ${BAO_SECRET_PATH_RUSTFS:-rustfs/prod}
      BAO_SECRET_PATH_OAUTH2_PROXY: ${BAO_SECRET_PATH_OAUTH2_PROXY:-oauth2-proxy/prod}
      BAO_SECRET_PATH_KEYCLOAK: ${BAO_SECRET_PATH_KEYCLOAK:-keycloak/prod}
    depends_on:
      - keycloak
    networks:
      - internal
      - rustfs

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command:
      - start-dev
      - --http-port=8080
      - --hostname-strict=false
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
    depends_on:
      - keycloak-db
    networks:
      - internal

networks:
  internal:
  rustfs:
    external: true
    name: ${RUSTFS_NETWORK:-rustfs_internal}

volumes:
  keycloak_db_data:
